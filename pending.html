<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pending Clearances - CargoTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-900 text-white">
            <div class="p-6">
                <h1 class="text-xl font-bold flex items-center gap-2">
                    <i class="fas fa-box-open text-blue-500"></i> CargoTrack Staff
                </h1>
            </div>
            <nav class="mt-6">
                <a href="dashboard.html" class="flex items-center gap-3 px-6 py-3 text-gray-300 hover:bg-gray-800">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="clearance-forms.html" class="flex items-center gap-3 px-6 py-3 text-gray-300 hover:bg-gray-800">
                    <i class="fas fa-file-alt"></i> Clearance Forms
                </a>
                <a href="pending.html" class="flex items-center gap-3 px-6 py-3 bg-blue-600">
                    <i class="fas fa-clock"></i> Pending
                </a>
                <a href="approved.html" class="flex items-center gap-3 px-6 py-3 text-gray-300 hover:bg-gray-800">
                    <i class="fas fa-check-circle"></i> Approved
                </a>
                <a href="reports.html" class="flex items-center gap-3 px-6 py-3 text-gray-300 hover:bg-gray-800">
                    <i class="fas fa-chart-bar"></i> Reports
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 overflow-auto">
            <nav class="bg-white shadow px-6 py-4 flex justify-between items-center">
                <h2 class="text-xl font-bold">Pending Clearances</h2>
                <div class="flex items-center gap-4">
                    <span class="text-gray-600">Staff Member</span>
                    <button onclick="logout()" class="text-red-500"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </nav>

            <div class="p-6">
                <div id="pendingList" class="space-y-4">
                    <div class="text-center py-12">
                        <i class="fas fa-spinner fa-spin text-4xl text-blue-600 mb-4"></i>
                        <p class="text-gray-600">Loading pending clearances...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    const API_BASE = '../api/cargo.php';
    const authToken = localStorage.getItem('authToken');

    document.addEventListener('DOMContentLoaded', loadPending);

    async function loadPending() {
        try {
            const res = await fetch(API_BASE + '?endpoint=pending-clearances', {
                headers: { 'Authorization': 'Bearer ' + authToken }
            });
            const result = await res.json();
            
            const container = document.getElementById('pendingList');
            if (result.success && result.data.length > 0) {
                container.innerHTML = result.data.map(c => `
                    <div class="bg-white rounded-lg shadow p-6">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-semibold">${c.customer_name}</h3>
                                <p class="text-sm text-gray-500 font-mono">${c.tracking_number}</p>
                                <p class="text-sm text-gray-600 mt-2"><i class="fas fa-map-marker-alt mr-2"></i>${c.destination}</p>
                            </div>
                            <span class="px-3 py-1 bg-yellow-100 text-yellow-800 rounded-full text-sm">Pending</span>
                        </div>
                        <div class="mt-4 flex gap-3">
                            <button onclick="viewDetails(${c.id})" class="text-blue-600 hover:underline text-sm">
                                <i class="fas fa-eye mr-1"></i>View Details
                            </button>
                        </div>
                    </div>
                `).join('');
            } else {
                container.innerHTML = '<div class="text-center py-12 text-gray-500">No pending clearances</div>';
            }
        } catch (e) {
            console.error('Error:', e);
        }
    }

    function viewDetails(id) {
        window.location.href = `pending-clearances.html?id=${id}`;
    }

    function logout() {
        localStorage.removeItem('authToken');
        localStorage.removeItem('currentUser');
        window.location.href = 'index.html';
    }
    </script>
    <!-- ==================== JAVASCRIPT FILES ==================== -->
<!-- Load in order: utils → auth → shipments → admin → main -->
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/shipments.js"></script>
<script src="js/admin.js"></script>
<script src="js/main.js"></script>
</body>
</html>
